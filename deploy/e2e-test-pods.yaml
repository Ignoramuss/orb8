apiVersion: v1
kind: Pod
metadata:
  name: echo-server
  namespace: default
  labels:
    app: echo-server
spec:
  nodeSelector:
    kubernetes.io/hostname: orb8-test-control-plane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: echo-svc
  namespace: default
spec:
  selector:
    app: echo-server
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: traffic-gen
  namespace: default
  labels:
    app: traffic-gen
spec:
  nodeSelector:
    kubernetes.io/hostname: orb8-test-worker
  containers:
    - name: curl
      image: curlimages/curl:latest
      command: ["sleep", "3600"]
